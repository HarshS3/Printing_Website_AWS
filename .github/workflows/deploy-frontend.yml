name: Deploy Frontend

on:
  workflow_call:  # allows this to be called from main deploy.yml

jobs:
  deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build React app
        run: |
          cd frontend
          npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.ALB_DNS }}

      - name: Upload build to S3
        run: |
          aws s3 sync frontend/build/ s3://printshop-frontend-code --delete

      - name: Invalidate CloudFront cache (uncomment when CloudFront is enabled)
        run: |
          echo "CloudFront invalidation skipped - using S3 website hosting"
        # run: |
        #   aws cloudfront create-invalidation \
        #     --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
        #     --paths "/*"
