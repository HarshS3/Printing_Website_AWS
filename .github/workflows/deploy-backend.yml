name: Deploy Backend

on:
  workflow_call:  # allows this to be called from main deploy.yml

jobs:
  deploy:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd backend
          npm install --production

      - name: Zip backend code (EC2)
        run: |
          zip -r Printing_Website_AWS-master.zip backend/ frontend/ deploy.sh -x "*.git*" -x "node_modules/*" -x "frontend/node_modules/*"

      - name: Upload EC2 zip to S3
        run: |
          aws s3 cp Printing_Website_AWS-master.zip s3://printshop-app-code/Printing_Website_AWS-master.zip

      - name: Zip Lambda code
        run: |
          cd backend
          zip -r ../function.zip lambda.js db.js package.json node_modules/

      - name: Upload Lambda zip to S3
        run: |
          aws s3 cp function.zip s3://lambda-bucket-testing-tf/function.zip

      - name: Trigger ASG Instance Refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name asg-for-ec2 \
            --preferences '{"MinHealthyPercentage": 50}' \
            --region us-east-1

      - name: Wait for Instance Refresh to complete
        run: |
          echo "Waiting for instance refresh..."
          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name asg-for-ec2 \
              --region us-east-1 \
              --query 'InstanceRefreshes[0].Status' \
              --output text)
            echo "Status: $STATUS"
            if [ "$STATUS" = "Successful" ]; then
              echo "Instance refresh completed successfully!"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Instance refresh failed!"
              exit 1
            fi
            sleep 30
          done
